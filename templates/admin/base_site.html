{% extends "admin/base.html" %}
{% load static %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | {{ site_header|default:"Magoreal" }}{% endblock %}

{% block extrahead %}
    {{ block.super }}
    <script>
    (function() {
        // Logo SVG de SiteConfig como favicon dinámico
        var svg = "{{ siteconfig.logo_svg|escapejs }}";
        if (svg) {
            try {
                var blob = new Blob([svg], {type: 'image/svg+xml'});
                var url = URL.createObjectURL(blob);
                var link = document.createElement('link');
                link.rel = 'icon';
                link.type = 'image/svg+xml';
                link.href = url;
                document.head.appendChild(link);
            } catch(e) {
                console.warn('Could not set favicon from logo:', e);
            }
        }
    })();
    </script>
{% endblock %}
