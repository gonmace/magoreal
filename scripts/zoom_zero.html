<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Zoom 0</title>
<style>body{background:#fff;padding:30px;font-family:system-ui;}
.row{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
.cell{display:flex;flex-direction:column;align-items:center;}
.caption{font-size:11px;margin-bottom:4px;color:#666;}
svg{background:#fff;border:1px solid #ccc;}</style></head><body>
<h2>Zoom inferior derecho del 0 (donde debería estar el slit)</h2>
<div id="container"></div>
<script>
fetch('/preview_keyhole_data.json').then(r => r.json()).then(d => {
  const c = document.getElementById('container');
  ['original','keyhole','keyhole_stroke'].forEach(k => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.innerHTML = `<div class="caption">${k}</div>`;
    div.innerHTML += d[k];
    c.appendChild(div);
  });
});
</script>
</body></html>
